[item-description]
tech-priests-emergency-smelter=A one-by-one emergency stone smelter for the lowest rung of Martian bootstrap industry. It exists so priests can stop pretending iron plates can be bullied into existence by hand.
sacred-machine-oil=A crude sanctified lubricant applied explicitly to a nearby machine by using it like a capsule/repair item. Restores Machine Spirit Sanctification instead of physical health. Cogitator Stations may also issue it to Tech-Priests for automatic rites.
mechanical-detritus=Shredded machine scrap, malformed components, broken gear teeth, rejected housings, incomplete parts, and ritually invalid production residue produced when a poorly sanctified machine obeys badly.
ritual-salt=White crystalline residue extracted from water under conditions officially described as purification and unofficially described as evaporative grumbling.
pure-carbon=Coal reduced into a denser ritual carbon feedstock. Still filthy, but now with paperwork.
sodium-carbonate=An alkaline reagent made from ritual salt and pure carbon. Also known to lesser minds as useful chemical powder rather than sacred machine appeasement material.
wood-pulp=Pulverized wood fiber prepared for filtration, binding, and the production of more efficient sacred machine oils.
junior-cogitator-station=A one-slot local command node that deploys a paired Junior Tech-Priest. Junior doctrine is station-bound: the priest repairs, consecrates, and defends only with supplies already in the Cogitator inventory or delivered there by logistics. It will not roam for supplies, clear clutter, or fabricate emergency items. Base operating radius: 20 tiles. Quality adds up to +5 operating radius at legendary.
intermediate-cogitator-station=A two-slot local command node that deploys a paired Intermediate Tech-Priest. Intermediate doctrine allows local scavenging: if logistics cannot provide a needed supply, the priest can scan nearby inventories and clear station clutter, but it will not perform emergency field fabrication. Base operating radius: 25 tiles. Quality adds up to +5 operating radius at legendary.
senior-cogitator-station=A three-slot local command node that deploys a paired Senior Tech-Priest. Senior doctrine allows full escalation: logistics requests, local scavenging, clutter cramming, and last-ditch emergency field fabrication when every proper supply path fails. Base operating radius: 30 tiles. Quality adds up to +5 operating radius at legendary.
orbital-trader=A stationary Mechanicus exchange altar for sanctioned off-world trade recipes. When Space Age is active, it attempts to borrow cargo-landing-pad visual doctrine; otherwise it remains a safer local machine shell until proper art is ordained.
paraffin=Wax stock separated from crude oil. Mundane, flammable, and therefore spiritually useful once someone important declares it sacred.
sacred-candle=A machine-cult candle rendered from paraffin and Sacred Machine Oil. Mostly wax, partly lubricant, entirely necessary according to the procurement office.
machine-maintenance-litany=A mid-tier sanctification package made from sacred candles, a gear, and a repair pack. Use it directly on a nearby sanctified machine to restore ten Machine Spirit Sanctification.
offworld-cogitator-components=Imported cogitator fragments, socketed logic wafers, and inscrutable brass-thinking components unavailable through normal planetary industry.
servitor-parts=Imported bionically unfortunate maintenance components reserved for future servitor and priest-support systems.
relic-fragment=A small off-world relic fragment of uncertain provenance and very certain invoicing.
void-sealed-cargo=Sealed cargo received from orbital channels. It has not exploded, hissed, or whispered yet, which counts as compliance.
ritual-of-machine-appeasement=A packaged rite of servitor parts and Machine Maintenance Litanies. Use it directly on a nearby sanctified machine to restore twenty Machine Spirit Sanctification, or place it inside a Cogitator Station for Tech-Priest application.
sacred-incense-grenade=A sanctified volatile censer packed with sacred oil, sacred candles, and explosives. Throw it like a capsule to burst into gray-white incense smoke, restoring five Machine Spirit Sanctification to nearby valid machines.
blackstone-asteroid-chunk=A recovered chunk of Blackstone asteroid mass: dense, black, near-indestructible, and unwilling to explain itself.
blackstone-fragment=A machined splinter of Blackstone. It has the comforting density of a bad decision with structural applications.
blackstone-slab=A compressed plate of Blackstone fragments bound into something resembling useful material and definitely not a cursed altar brick.
citadel-manufactoreo=A platform-only manufactureo for cutting and compressing Blackstone asteroid matter. It belongs in space because planets have laws, gravity, and witnesses.
entropic-extractor=A 3x3 platform-only Blackstone power reliquary. It combines off-world cogitator parts, servitor matter, and one Blackstone slab into a burner-generator that consumes raw Blackstone asteroid chunks and meters impossible stored energy into the platform grid.
hydrogen-thruster=A primitive platform-only thruster rebuilt to burn liquid hydrogen and liquid oxygen. It exists for the engineer who looked at ice, electricity, and vacuum and decided that was enough for propulsion doctrine.
sterling-steam-catalyzer=A two-by-four platform-only burner catalyzer that accepts ordinary fuel and water, then coughs out a deliberately modest amount of boiler-temperature steam for primitive space operations.
void-steam-engine=A two-by-two platform-only steam electric generator that consumes steam in vacuum service and produces one third of a standard steam engine's output without passing exhaust steam onward.
iron-salts=Reactive iron salts precipitated from carbonic acid and iron ore. The crystals hum faintly when stored near sacred oil, which the procurement office has chosen to classify as promising rather than alarming.
thetazine-thruster=A platform-only thruster configured to burn Thetazine fuel against plain water. It is a Blackstone-assisted propulsion device for engineers who looked at cryogenic hydrogen and decided it lacked sufficient theological risk.
void-fusion-thruster=A final electric void-drive spine for space platforms. Internally it is still a thruster family machine; externally, it appears as a long one-by-nine fusion-assisted electric propulsion relic.
void-fusion-thruster-power-sink=Hidden power sink paired to a Void-Fusion Thruster. If you are reading this in normal play, something has escaped the containment litany.
void-cogitator-station=A Cogitator Station upgraded for zero-G platform service. It deploys a pale Void Tech-Priest using maneuvering-pack doctrine. Planetside adepts are not rated for this much void nonsense.
planetary-magos-cogitator-station=A high-command planetary Cogitator Station above Senior grade. Deploys a Planetary Magos and remains separate from Void Cogitator doctrine.
auspex-scrap=Fragments of field auspex casings, cracked signal vanes, and half-legible calibration marks recovered from sealed orbital cargo.
hexagrammic-circuit-shard=A splinter of red circuitry etched with warding geometry. It is either blessed, shorted, or both.
archeotech-capacitor=A sealed charge vessel from an older and more confident manufacturing tradition. It occasionally remembers voltage on its own.
micro-servitor-actuator=A small bionic drive joint suitable for servitor work, emergency machinery, or making auditors uncomfortable.
machine-spirit-bound-relay=A relay that appears to switch only after being addressed politely. Technically this is not a standards-compliant signal behavior.
sanctified-lens-array=A lens cluster with too many focal points and an excellent opinion of itself.
plasma-coil-reliquary=A contained coil relic that hums like a plasma weapon trying to be furniture.
void-burned-cogitator-core=A charred thinking-core recovered from sealed cargo. Its survival is suspicious; its usefulness is undeniable.
red-robe-fiber-bundle=Rolls of Mechanicus-red technical fiber. The fabric stains gloves, belts, and moral certainty.
noospheric-targeter=A targeting adjunct full of advisory runes and poorly restrained confidence.
combat-servitor-targeting-eye=A salvaged target-eye from something that used to be obedient, angry, and technically employable.
sealed-ration-cache=A sealed ration cache. It is probably edible. The certification stamp is older than the factory.
omen-bearing-data-slate=A data slate that reports diagnostics as omens and omens as actionable maintenance instructions.
spent-phosphor-lumen=A lamp component with enough afterglow to be useful and enough residue to be concerning.
ritually-suspect-machine-plate=A machine plate recovered from void cargo. It is structurally sound and spiritually under review.
void-chilled-lubricant-ampoule=A cold ampoule of lubricant recovered from a sealed cargo pocket. It refuses to reach room temperature.
las-carbine=A strange parallel small arm recovered from sealed Mechanicus surplus. It behaves like a lightly improved factory weapon beneath far more red paint and liturgical labels.
hot-shot-power-cell=A volatile ammunition cell compatible with the Las-Carbine's battlefield fantasies and the factory's usual firearms logic.
rite-sealed-flak-vest=A lightly improved flak vest sealed in ritual packaging and stamped with more warning glyphs than armor plating.
mars-pattern-repair-kit=A repair kit with improved tool steel, suspicious incense residue, and a tendency to be requisitioned before anyone can ask where it came from.
large-void-fusion-thruster=A wide electric void-fusion thruster variant. Less impossible than the one-by-nine spine, which is not the same as sensible.
tech-priests-martian-stone-cache=A crude field reliquary made from rocks and spite. Tech-Priests use it as an emergency station-bound stash when the Cogitator has no room left for scavenged supplies.
tech-priests-stone-cache-item-vault=A reinforced stone item vault with ten general-purpose slots for local emergency storage when a Cogitator cell needs a little more shameful shelving.
tech-priests-stone-cache-coal=A six-slot stone cache keyed for coal only. Wrong offerings are expelled by the cache-filter steward because the machine spirit prefers clear labels.
tech-priests-stone-cache-stone=A six-slot stone cache keyed for stone only. Storing stone in stone is not creative, but it is structurally convincing.
tech-priests-stone-cache-wood=A six-slot stone cache keyed for wood only. The surrounding masonry discourages the wood from pretending it is a building material with ambitions.
tech-priests-stone-cache-iron-ore=A six-slot stone cache keyed for iron ore only. Useful for primitive emergency smelting lines and other low dignity metallurgy.
tech-priests-stone-cache-copper-ore=A six-slot stone cache keyed for copper ore only. The copper is watched, counted, and given no opportunity to become wire without paperwork.
tech-priests-stone-cache-iron-plate=A six-slot stone cache keyed for iron plates only. It stores plates in neat blasphemously practical stacks.
tech-priests-stone-cache-copper-plate=A six-slot stone cache keyed for copper plates only. Low-tech storage for materials that will later become high-maintenance problems.
tech-priests-stone-cache-copper-cable=A six-slot stone cache keyed for copper cable only. Keeps wire coils visible and contained before they become a floor-based heresy.
tech-priests-stone-cache-iron-gear-wheel=A six-slot stone cache keyed for iron gear wheels only. The gears fit too well, which is always suspicious.
tech-priests-stone-cache-iron-stick=A six-slot stone cache keyed for iron rods only. Officially iron sticks, spiritually rods, practically a bin of straightened arguments.
tech-priests-stone-cache-primitive-acclimator-battery-bank=A two-by-two primitive battery-bank cache. It stores electrical charge rather than physical items and unlocks with accumulator doctrine.
tech-priests-stone-cache-pressurized-fluid-vault=A two-by-two pressurized stone fluid vault. It stores fluid through ordinary pipe connections rather than physical inventory slots.
tech-priests-basic-space-cargo-inventory=A long, basic twenty-slot void cargo inventory intended to unlock alongside Void Cogitator doctrine for early platform-side stockpiling.
tech-priests-advanced-space-cargo-inventory=A hardened fifty-slot void cargo inventory for more serious platform-side stockpiling and later noospheric cargo discipline.
tech-priests-data-spike=A player-only hostile-force reclamation spike. Throw it at a rogue Tech-Priest, Cogitator Station, turret, wall, inserter, machine, or seized structure to begin a visible countdown. If the countdown completes before counter-spike cancellation or removal, ownership transfers to your force.
