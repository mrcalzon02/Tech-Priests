[mod-setting-description]
tech-priests-debug-mode=Central debug/profiler/log-spam control. Off disables live debug surfaces; summary enables compact readouts; verbose permits high-detail logging; profiler enables measured callback timing. Legacy honors older debug toggles as compatibility aliases.
tech-priests-use-lean-gui-sprites=Uses generated half-resolution decorative GUI sprites for lower-memory clients. Startup setting; changing it requires a restart.
tech-priests-enable-doctrine-rebellions=If enabled, a doctrine family at zero loyalty causes its existing priests and stations to defect to a hostile schism force. If disabled, the family is reset to baseline loyalty instead.
tech-priests-dont-touch-my-toys=When enabled, defecting priests may not seize player machines, turrets, pipes, belts, poles, containers, or walls inside their Cogitator station radius. Disable this if you want schisms to claim nearby factory assets.
tech-priests-order-execution-watchdog-seconds=How long an active Cogitator writ may exist without a movement/work executor before the watchdog attempts to re-arm it. This should repair silent active orders, not interrupt moving priests.
tech-priests-station-task-switch-sound-cooldown-seconds=Minimum time before the same Cogitator Station may play another task-switch cue. Stable order changes still play; mode-string churn is suppressed.
tech-priests-writ-audio-cooldown-seconds=Minimum time before repeated writ calls may play another Tech-Priest writ cue for the same pair/key.
tech-priests-enable-sound-manager=Routes Cogitator task-switch cues, Tech-Priest writ calls, and action sounds through one cooldown-governed audio authority. Disable this to silence the new unified manager while leaving other settings intact.
tech-priests-cogitator-bios-boot-speed-percent=Controls the Cogitator Work State BIOS boot sequence pace. 25 reproduces the earlier slow debug cadence, 50 is the default readable pace, and 100 is the fastest permitted rite.
tech-priests-enable-logistics-debug-overlay=Shows compact per-station diagnostics for hidden requester cache status, active requested item, network availability, request-slot write status, network item count, cache contents, and station insert space. Intended for debugging logistics delivery.
tech-priests-base-max-sanctification=The normal maximum Machine Spirit Sanctification for newly registered machines. Existing machines are scaled when this value changes.
tech-priests-starting-sanctification=The starting sanctification value for newly registered machines, clamped to the configured maximum.
tech-priests-minimum-sanctification-percent=The hard lower floor for current sanctification as a percentage of that machine's current maximum. Default 5 means a machine cannot fall below 5% sanctification.
tech-priests-min-degraded-max-sanctification=The lowest maximum sanctification a machine can be degraded down to by foul operation damage.
tech-priests-sacred-oil-restore-amount=How much sanctification one Sacred Machine Oil restores when applied manually or by a Tech-Priest.
tech-priests-min-sanctification-decay-per-operation=The minimum amount of sanctification lost when a tracked machine completes one crafting operation. Default is now 3 so decay is visible during normal playtesting.
tech-priests-max-sanctification-decay-per-operation=The maximum amount of sanctification lost when a tracked machine completes one crafting operation. Default is now 10; if this is lower than the minimum, the mod swaps them safely at runtime.
tech-priests-sanctification-decay-random-jitter-percent=Extra random variance applied to each operation's sanctification decay after the configured min/max roll. This is intentionally visible during live testing so the bar visibly ticks down instead of appearing stuck.
tech-priests-show-sanctification-decay-floaters=Shows a brief -X sanctity floating text when a tracked machine completes an operation and loses sanctification. Useful while verifying the system is actually firing.
tech-priests-sanctification-decay-floater-min-amount=Smallest current-sanctification decay amount that will create floating text. Set to 0 to display every operation.
tech-priests-physical-damage-threshold=Machines below this current sanctification value may damage themselves when completing operations. Set to 0 to disable physical self-damage.
tech-priests-physical-damage-max-chance-percent=Chance at near-zero sanctification for a completed operation to physically damage the machine.
tech-priests-physical-damage-min-health-percent=Minimum self-damage as a percentage of maximum health when the damage roll succeeds.
tech-priests-physical-damage-max-health-percent=Maximum self-damage as a percentage of maximum health when the damage roll succeeds. Damage scales up as sanctification falls.
tech-priests-max-sanctification-damage-threshold=Machines below this current sanctification value may lose maximum sanctification capacity when completing operations. Set to 0 to disable capacity degradation.
tech-priests-max-sanctification-damage-max-chance-percent=Chance at near-zero sanctification for a completed operation to damage maximum sanctification capacity. Default increased to 14%, with chance scaling worse as current sanctification approaches zero.
tech-priests-max-sanctification-damage-min-amount=Minimum maximum-sanctification capacity lost when the capacity damage roll succeeds. Default is now 14 to make sanctification damage visibly meaningful.
tech-priests-max-sanctification-damage-max-amount=Maximum maximum-sanctification capacity lost when the capacity damage roll succeeds. Default is now 19, leaving room for later upgrade research to reduce the range.
tech-priests-enable-station-request-debug-icons=Displays the rich-text icon of the item currently being requested, scavenged, or crammed above the Cogitator Station.
tech-priests-enable-idle-scan-behavior=Allows idle Tech-Priests to wander within their Cogitator radius and sweep nearby structures with a green diagnostic scanning beam.
tech-priests-enable-idle-conversations=Allows idle Tech-Priests within a Cogitator Station radius to occasionally converse about the last researched technology, including unknown modded research.
tech-priests-idle-conversation-chance-percent=Chance checked during conservative idle conversation attempts. Lower this if the priesthood is becoming too chatty.
tech-priests-doctrine-argument-chance-percent=Chance for eligible background chatter pairs to start a doctrine argument instead of ordinary ambient dialogue.
tech-priests-doctrine-chatter-chance-percent=Chance for eligible background chatter pairs to use doctrine relationship dialogue before falling back to legacy ambient lines.
tech-priests-enable-full-priority-diagnostics=Writes verbose priority and behavior diagnostics. Default is off for normal play because megabases should not pay for constant debug logging.
tech-priests-priority-diagnostics-interval-ticks=Tick interval for priority diagnostics when explicitly enabled.
tech-priests-enable-emergency-diagnostics=Writes periodic emergency pair-state diagnostics to script-output. Default is off; enable only when actively troubleshooting.
tech-priests-emergency-diagnostics-interval-ticks=Tick interval for emergency diagnostics when explicitly enabled.
tech-priests-quarantine-idle-until-priorities-clear=Keeps idle/chatter behavior suppressed while higher-priority work queues are visibly unresolved.
tech-priests-enable-task-sounds=Allows Tech-Priest task audio cues to play through the unified sound manager.
tech-priests-task-sound-volume-percent=Volume multiplier for Tech-Priest task audio cues.
tech-priests-enable-background-chatter=Allows low-frequency ambient Tech-Priest conversation when priests are not urgently occupied.
tech-priests-background-chatter-chance-percent=Chance checked during a background chatter pulse.
tech-priests-background-chatter-busy-reject-percent=Chance that a busy priest refuses ambient chatter so work remains visually dominant.
tech-priests-background-chatter-interval-ticks=Minimum cadence for background chatter pulses.
tech-priests-background-chatter-allow-passive-busy-rejection=Allows passive busy-priest rejection lines when chatter is attempted during work.
tech-priests-background-chatter-line-cooldown-ticks=Per-line cooldown to prevent repeated chatter phrases from spamming the same save.
tech-priests-direct-priest-tap-chatter-cooldown-ticks=Cooldown after directly selecting/tapping a priest before another direct response can play.
tech-priests-task-retention-seconds=How long the UI and work-state reports preserve recently completed task identity before returning to idle display.
tech-priests-standard-writ-cadence-seconds=Minimum cadence between ordinary station writ calls.
tech-priests-magos-writ-cadence-seconds=Minimum cadence between Planetary Magos writ calls.
tech-priests-magos-plan-cadence-seconds=Minimum cadence between Planetary Magos planning pulses.
tech-priests-standard-pending-writ-cap=Maximum queued pending writs for non-Magos stations.
tech-priests-magos-pending-writ-cap=Maximum queued pending writs for Planetary Magos stations.

