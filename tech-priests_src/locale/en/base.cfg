[recipe-description]
tech-priests-emergency-repair-pack=A crude emergency repair rite: four copper plates and seven iron plates consumed over six seconds to produce one repair pack when proper industrial supply is not yet established.
emergency-sacred-machine-oil=Render five wood and three coal into one crude unit of Sacred Machine Oil. Inefficient, filthy, and available before fluid handling.
tech-priests-emergency-smelter=Assemble a tiny emergency smelter from four stone so iron plates can be produced in a machine instead of through hand-crafted theological nonsense.
tech-priests-atmospheric-water-condensing=Condenses a pitiful quantity of water from the atmosphere. Useful when the planet, platform, or planning department has failed to provide a sensible pump.
sacred-machine-oil=Render wood, coal, and steam into crude Sacred Machine Oil. Inefficient, smoky, default-authorized, and therefore doctrinally acceptable.
efficient-sacred-machine-oil=Use wood pulp, sodium carbonate, and steam to produce four times the sacred oil output of the crude process.
ritual-salt=Extract eight units of ritual salt from 100 units of water. The impurities are advised to feel ashamed.
pure-carbon=Purify two units of coal into three units of Pure Carbon.
sodium-carbonate=Combine Ritual Salt and Pure Carbon into Sodium Carbonate.
wood-pulp=Reduce wood into fibrous pulp for improved sacred oil processing.
mechanical-detritus-reclamation=Smelt ten units of jam-prone machine trash into a miserable probabilistic return of ore, slag-adjacent usefulness, and the occasional deeply concerning radioactive pebble. Modded ore resources are added at low probability when detected.
mechanical-detritus-recycling=Feed ten units of machine-spirit garbage into a recycler. If Space Age scrap exists, the recycler has a miserable chance to condense the pile into one usable scrap item instead of recursively manufacturing more trash. Without Space Age, it falls back to lossy ore fragments.
orbital-trader=Construct a sanctioned Orbital Trader altar from steel, green circuits, red circuits, copper wire, and sacred oil. This must exist before the new imported Cogitator Station chain can begin.
orbital-trade-offworld-cogitator-components=Spend sacred oils and circuits to request off-world cogitator components through channels that are definitely official enough for now.
orbital-trade-servitor-parts=Exchange oils and gears for imported servitor parts. No questions are asked because all answers would be unpleasant.
orbital-trade-relic-fragment=Package maintenance litanies and steel for a very expensive sliver of off-world holiness.
orbital-trade-void-sealed-cargo=Render oils and repair supplies into sealed orbital cargo for later systems.
paraffin=Separate crude oil into paraffin wax stock for sacred candle production.
sacred-candle=Combine paraffin and Sacred Machine Oil into sacred candles for stronger maintenance rites.
machine-maintenance-litany=Bind sacred candles, a gear, and a repair pack into a mid-tier sanctification item that restores ten sanctification on application.
ritual-of-machine-appeasement=Bind servitor parts and Machine Maintenance Litanies into a stronger appeasement rite that restores twenty sanctification.
sacred-incense-grenade=Pack sacred oil, sacred candles, and explosives into a throwable incense charge that bursts into gray-white sanctifying smoke.
junior-cogitator-station=Construct a Junior Cogitator Station from off-world cogitator components, servitor parts, green circuits, red circuits, and copper wire. The priest does not come cheap anymore.
intermediate-cogitator-station=Upgrade a Junior Cogitator Station using more off-world components, additional servitor parts, Machine Maintenance Litanies, and red circuits.
senior-cogitator-station=Upgrade an Intermediate Cogitator Station with expanded servitor provisioning, Machine Maintenance Litanies, a relic fragment, and void-sealed cargo.
citadel-manufactoreo=Construct the Citadel Manufactureo, a platform-only machine for cutting and compressing Blackstone under appropriately paranoid conditions.
blackstone-fragment-from-asteroid-chunk=Cut a Blackstone asteroid chunk into one usable fragment, with a little ordinary stone shaken loose as geological shame.
blackstone-slab-compression=Compress ten Blackstone fragments with sacred oil into one slab of dense arcane material.
entropic-extractor=Combine off-world cogitator components, servitor parts, and one Blackstone slab into a 3x3 space-platform-only burner-generator that accepts raw Blackstone chunks as petajoule-scale fuel and outputs a capped 2 MW over an extremely long burn.
water-electrolysis=Use a chemical plant and an offensive amount of electrical patience to crack water into small amounts of liquid hydrogen and liquid oxygen for primitive platform propulsion.
hydrogen-thruster=Assemble a primitive hydrogen thruster from four steam engines, off-world cogitator parts, servitor components, and pipework, because apparently steam doctrine was not sufficiently alarming until attached to cryogenic propellant.
sterling-steam-catalyzer=Adapt a boiler with off-world cogitator components, servitor parts, and pipework into a two-by-four platform-only steam catalyzer. It burns ordinary fuel and produces boiler-temperature steam for vacuum-side primitive power.
void-steam-engine=Adapt a steam engine with off-world cogitator components, servitor parts, and pipework into a two-by-two platform-only generator that produces 300 kW and does not pass steam through.
carbonic-acid-from-carbon=React Space Age carbon with liquid hydrogen in a chemical plant to produce carbonic acid. It is a concession to logistics: if the platform gives us carbon, the priesthood will abuse it.
carbonic-acid-from-pure-carbon=React Tech-Priest pure carbon with liquid hydrogen in a chemical plant to produce carbonic acid. This is the fallback rite for platforms not blessed with convenient carbon stock.
iron-salts-from-carbonic-acid=Mix carbonic acid with iron ore to precipitate iron salts, because apparently the correct answer to propulsion chemistry was to make the ore nervous.
magneto-resonant-slurry=Bind iron salts with Sacred Machine Oil into a purple-black magneto-resonant slurry, a fluid whose only redeeming quality is that it has not yet eaten the pipe.
thetazine-fuel-from-blackstone-slurry=Process magneto-resonant slurry through a single Blackstone slab for ten seconds to produce a prodigious volume of Thetazine fuel. The slab is officially a catalyst. Unofficially, no one is sure what it agreed to.
thetazine-thruster=Assemble a Thetazine Thruster from a hydrogen thruster, off-world cogitator components, servitor parts, iron salts, and pipework.
void-fusion-thruster=Assemble a one-by-nine electric platform thruster from a large quantity of void-sealed cargo, Blackstone slabs, lightning rods, and eight portable fusion reactors. The recipe is less manufacturing than indictment.
tech-priests-emergency-smelt-iron-ore-to-iron-plate=A slow, fuel-burning survival smelting rite run by the Martian Emergency Assembler.
tech-priests-emergency-smelt-copper-ore-to-copper-plate=A slow, fuel-burning survival smelting rite run by the Martian Emergency Assembler.
tech-priests-emergency-smelt-stone-to-stone-brick=A slow, fuel-burning survival smelting rite run by the Martian Emergency Assembler.
void-sealed-cargo-scrutiny=Open one sealed cargo unit under auspex supervision. Produces a low-probability spread of strange intermediate components, suspicious circuitry, and the occasional relic-adjacent object.
void-sealed-cargo-militant-unsealing=Open one sealed cargo unit as battlefield surplus. May produce Las-Carbines, Hot-Shot Power Cells, flak vests, repair kits, or ordinary violence in a box.
void-sealed-cargo-riteful-sorting=Open one sealed cargo unit with Sacred Machine Oil and patient ritual sorting. Biases the crate toward rite materials, robes, omens, and spiritually questionable machine parts.
large-void-fusion-thruster=Assemble the wide four-by-four electric Void-Fusion Thruster variant from void-sealed cargo, Blackstone slabs, lightning rods, and fusion hardware.
tech-priests-martian-stone-cache=Assemble a crude emergency cache from stone. It is ugly, heavy, and doctrinally preferable to scattering ammunition into the mud.
tech-priests-stone-cache-item-vault=A reinforced stone item vault with ten general-purpose slots for local emergency storage when a Cogitator cell needs a little more shameful shelving.
tech-priests-stone-cache-coal=A six-slot stone cache keyed for coal only. Wrong offerings are expelled by the cache-filter steward because the machine spirit prefers clear labels.
tech-priests-stone-cache-stone=A six-slot stone cache keyed for stone only. Storing stone in stone is not creative, but it is structurally convincing.
tech-priests-stone-cache-wood=A six-slot stone cache keyed for wood only. The surrounding masonry discourages the wood from pretending it is a building material with ambitions.
tech-priests-stone-cache-iron-ore=A six-slot stone cache keyed for iron ore only. Useful for primitive emergency smelting lines and other low dignity metallurgy.
tech-priests-stone-cache-copper-ore=A six-slot stone cache keyed for copper ore only. The copper is watched, counted, and given no opportunity to become wire without paperwork.
tech-priests-stone-cache-iron-plate=A six-slot stone cache keyed for iron plates only. It stores plates in neat blasphemously practical stacks.
tech-priests-stone-cache-copper-plate=A six-slot stone cache keyed for copper plates only. Low-tech storage for materials that will later become high-maintenance problems.
tech-priests-stone-cache-copper-cable=A six-slot stone cache keyed for copper cable only. Keeps wire coils visible and contained before they become a floor-based heresy.
tech-priests-stone-cache-iron-gear-wheel=A six-slot stone cache keyed for iron gear wheels only. The gears fit too well, which is always suspicious.
tech-priests-stone-cache-iron-stick=A six-slot stone cache keyed for iron rods only. Officially iron sticks, spiritually rods, practically a bin of straightened arguments.
tech-priests-stone-cache-primitive-acclimator-battery-bank=A two-by-two primitive battery-bank cache. It stores electrical charge rather than physical items and unlocks with accumulator doctrine.
tech-priests-stone-cache-pressurized-fluid-vault=A two-by-two pressurized stone fluid vault. It stores fluid through ordinary pipe connections rather than physical inventory slots.
tech-priests-basic-space-cargo-inventory=A long, basic twenty-slot void cargo inventory intended to unlock alongside Void Cogitator doctrine for early platform-side stockpiling.
tech-priests-advanced-space-cargo-inventory=A hardened fifty-slot void cargo inventory for more serious platform-side stockpiling and later noospheric cargo discipline.

servitor-parts=Purchases or prepares servitor parts for higher-order maintenance rites.
offworld-cogitator-components=Imports offworld cogitator components through sanctioned trade channels.
relic-fragment=Procures relic fragments for senior station construction and ritual apparatus.
void-sealed-cargo=Unseals void cargo into salvage and esoteric Mechanicus supplies.
tech-priests-data-spike=Assemble a player-only hostile-force reclamation spike for recovering structures and Tech-Priest pairs during doctrinal schism.
