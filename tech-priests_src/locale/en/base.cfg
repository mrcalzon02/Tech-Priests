[fluid-description]
liquid-hydrogen=Cryogenic hydrogen split from water by chemical-plant electrolysis. It is wonderfully eager to escape containment and therefore naturally suited to primitive propulsion.
liquid-oxygen=Cryogenic oxygen split from water by chemical-plant electrolysis. It makes hydrogen much more convincing as a way to move a space platform.
carbonic-acid=A dissolved carbonic reagent produced from carbon and liquid hydrogen. Mildly acidic, annoyingly useful, and one step closer to propulsion doctrine.
magneto-resonant-slurry=A sacred-oil-bound suspension of iron salts tuned for Blackstone catalysis. It responds poorly to skepticism and pipe junctions.
thetazine-fuel=A prodigious liquid fuel generated from magneto-resonant slurry through Blackstone catalysis. It reacts with water inside a Thetazine Thruster to create thrust and concern.
void-fusion-thruster-charge=Hidden drive-field charge generated inside a powered Void-Fusion Thruster. Not intended for barrels, pipes, export, consumption, contemplation, or workplace exposure.
void-fusion-thruster-reaction-mass=Hidden void reaction mass generated inside a powered Void-Fusion Thruster. It is a gameplay proxy for electric propulsion and a theological proxy for bad ideas.

