[entity-description]
tech-priests-emergency-smelter=A one-by-one emergency burner smelter made from four stone. It consumes fuel, smelts ore, and gives the priesthood a real machine for primitive plate production.
tech-priests-emergency-miner=A one-by-one emergency pseudo-miner assembled from shame, iron scrap, and a Tech-Priest's refusal to admit the supply chain has died. It no longer mines ore patches directly. Instead, it runs hidden zero-input, zero-power, long-wait pseudo-mining recipes for tiny survival outputs such as wood, stone, iron ore, copper ore, coal, uranium ore, and compatible modded resource products.
tech-priests-emergency-boiler=A compact two-by-two emergency boiler. Burns fuel badly, accepts water at the top, and produces steam left and right with the spiritual confidence of a barrel fire wearing a badge.
tech-priests-atmospheric-water-condenser=A one-by-one condenser that squeezes water from local atmosphere through cheap coils and uglier prayers. Requires power, outputs water very slowly, and refuses to operate where there is no atmosphere to offend.
tech-priests-emergency-steam-engine=A compact two-by-two steam engine that converts steam into barely adequate electricity while sounding like an apology translated through a wrench.
tech-priests-emergency-assembler=A one-by-one emergency assembler for crude dry crafting. It is not good. It is available, which is sometimes worse.
tech-priests-emergency-laboratorium=A one-by-one emergency laboratory scaffold. Accepts every recognized research tool item at final prototype time, because the Omnissiah's paperwork has no patience for mod dependency arguments.
tech-priests-emergency-power-grid=A one-by-one emergency pole-grid node with the same wire and supply reach as a small electric pole. It is a splinter, copper lash, and doctrinal refusal to let the lights go out.
assembling-machine-1=A mechanically enlarged 4x4 tier-one assembler prepared for Machine Spirit Sanctification testing. Its sanctification begins at 50/100, decays only while crafting, can be restored with Sacred Machine Oil, and now directly affects operation speed, pollution, and Mechanical Detritus output.
assembling-machine-2=A mechanically enlarged 4x4 tier-two assembler. It has been resized with the same ritual footprint as the lower tier so the vanilla upgrade chain remains intact.
assembling-machine-3=A mechanically enlarged 4x4 tier-three assembler. It preserves the assembler upgrade chain while preparing the machine body for later sanctification expansion.
tech-priest-small-arms-proxy=Invisible helper entity used to let Tech-Priests fire real bullet-category ammunition through Factorio turret logic.
tech-priests-cogitator-requester-cache=Invisible requester cache used by Cogitator Logistic Requisition so actual logistic robots deliver required supplies near the station.
tech-priests-cogitator-return-cache=Invisible active-provider cache used by Cogitator Logistic Requisition to eject unwanted station inventory when the priest needs room for a specific item.
junior-cogitator-station=A one-slot local Cogitator Station using a temporary substation-derived visual shell. Its paired Junior Tech-Priest follows station-bound doctrine: it uses only station inventory and logistics-delivered stock, with no roaming scavenger scans, cram runs, or desperation crafting. Select it to display operating radius. Higher quality adds health and up to +5 radius at legendary.
intermediate-cogitator-station=A two-slot local Cogitator Station. Its paired Intermediate Tech-Priest can use station supplies, wait on logistics, scan nearby inventories for missing items, and clear unwanted station clutter into nearby storage. It cannot perform last-ditch emergency fabrication. Higher quality adds health and up to +5 radius at legendary.
senior-cogitator-station=A three-slot local Cogitator Station. Its paired Senior Tech-Priest has full escalation authority: station supply use, logistics waiting, local inventory scans, cram-mode redistribution, and desperate five-second emergency fabrication if no proper source can be found. Higher quality adds health and up to +5 radius at legendary.
junior-tech-priest=A vulnerable ground-based maintenance adept paired to a Cogitator Station. Junior doctrine is obedient and local: it repairs, consecrates, and defends using only station-held supplies or items logistics has delivered into that station.
intermediate-tech-priest=A sturdier maintenance adept paired to an Intermediate Cogitator Station. If logistics fails or no network exists, it may scan nearby inventories for needed supplies and redistribute clutter, but it does not fabricate emergency replacements.
senior-tech-priest=A senior maintenance adept paired to a Senior Cogitator Station. When supply doctrine collapses, it may scan, scavenge, cram, and finally perform desperate field fabrication to produce the required item from local substitute materials.
junior-tech-priest-belt-immune=A Junior Tech-Priest chassis upgraded by the Rite of Kinetic Exemption. It ignores transport-belt coercion and walks with marginally less embarrassing urgency.
intermediate-tech-priest-belt-immune=An Intermediate Tech-Priest chassis upgraded by the Rite of Kinetic Exemption. It ignores transport-belt coercion and preserves maintenance doctrine in belt-choked factories.
senior-tech-priest-belt-immune=A Senior Tech-Priest chassis upgraded by the Rite of Kinetic Exemption. It ignores transport-belt coercion, as any red-robed adept with self-respect should.
orbital-trader=A sanctioned orbital exchange reliquary for off-world components and tithe-chain logistics. It serves the Cult Mechanicus supply rite, not vanilla rocket victory.
citadel-manufactoreo=A platform-only Mechanicus manufactureo for processing Blackstone asteroid chunks into fragments and slabs. It is not approved for planetary deployment because the ground keeps filing complaints.
blackstone-asteroid=A dense Blackstone asteroid. Early impacts are vanishingly rare; larger bodies become less impossibly uncommon and far less negotiable.
entropic-extractor=A 3x3 platform-only burner-generator that accepts only raw Blackstone asteroid chunks. It outputs a capped 2 MW while drawing from petajoule-scale fuel value over a frankly insulting duration.
hydrogen-thruster=A platform-only primitive thruster configured for liquid hydrogen and liquid oxygen. It is less a miracle of engineering than a chemically loud refusal to drift.
sterling-steam-catalyzer=A platform-only burner boiler analogue that turns fuel and water into boiler-temperature steam in small, stubborn batches. It is what happens when a steam cult looks at vacuum and refuses to apologize.
void-steam-engine=A compact platform-only steam engine that consumes steam for a modest 300 kW and does not output steam, because the operating environment has already filed the exhaust paperwork into space.
thetazine-thruster=A platform-only thruster that uses Thetazine fuel as the primary reactant and water as the secondary reactant. It turns Blackstone-catalyzed fuel chemistry into forward motion, paperwork, and probable future liability.
void-fusion-thruster=A one-by-nine platform-only electric thruster spine. It consumes grid power through a hidden electric sink and translates that power into a sealed void-drive field. No sane engineer asks what the reaction mass is.
void-cogitator-station=A sealed station-borne command shrine for the coordination of Void Tech-Priests. Rated for platform duty, low-gravity maneuvering doctrine, and the kind of maintenance work that planetary priests insist is not technically falling.
void-tech-priest=A pale-robed void-certified Tech-Priest equipped with ritual maneuvering thrusters, obstruction-agnostic platform doctrine, and enough sacred denial to perform maintenance without touching the floor.
void-tech-priest-belt-immune=A pale-robed void-certified Tech-Priest equipped with ritual maneuvering thrusters, obstruction-agnostic platform doctrine, and enough sacred denial to perform maintenance without touching the floor.
planetary-magos-cogitator-station=A four-slot high-command planetary Cogitator Station that deploys a black-robed Planetary Magos. It is planetside doctrine, not Void doctrine. Base operating radius: 30 tiles, with Magos command range upgrades intended to reach 42.
planetary-magos-tech-priest=A black-robed fourth-rank planetary Tech-Priest assigned to high-command machine-cluster oversight, repair, sanctification, and diagnostic doctrine.
planetary-magos-tech-priest-belt-immune=A black-robed fourth-rank planetary Tech-Priest with kinetic exemption rites.
large-void-fusion-thruster=A wider electric void-fusion platform thruster using the standard four-by-four edge-hanging profile. It has no visible fluid inputs and is serviced by hidden electric drive-field machinery at half standard thrust.
tech-priests-martian-stone-cache=A crude field reliquary made from rocks and spite. It exists so useful supplies are stored instead of shamefully thrown onto the floor.
tech-priests-stone-cache-item-vault=A reinforced stone item vault with ten general-purpose slots for local emergency storage when a Cogitator cell needs a little more shameful shelving.
tech-priests-stone-cache-coal=A six-slot stone cache keyed for coal only. Wrong offerings are expelled by the cache-filter steward because the machine spirit prefers clear labels.
tech-priests-stone-cache-stone=A six-slot stone cache keyed for stone only. Storing stone in stone is not creative, but it is structurally convincing.
tech-priests-stone-cache-wood=A six-slot stone cache keyed for wood only. The surrounding masonry discourages the wood from pretending it is a building material with ambitions.
tech-priests-stone-cache-iron-ore=A six-slot stone cache keyed for iron ore only. Useful for primitive emergency smelting lines and other low dignity metallurgy.
tech-priests-stone-cache-copper-ore=A six-slot stone cache keyed for copper ore only. The copper is watched, counted, and given no opportunity to become wire without paperwork.
tech-priests-stone-cache-iron-plate=A six-slot stone cache keyed for iron plates only. It stores plates in neat blasphemously practical stacks.
tech-priests-stone-cache-copper-plate=A six-slot stone cache keyed for copper plates only. Low-tech storage for materials that will later become high-maintenance problems.
tech-priests-stone-cache-copper-cable=A six-slot stone cache keyed for copper cable only. Keeps wire coils visible and contained before they become a floor-based heresy.
tech-priests-stone-cache-iron-gear-wheel=A six-slot stone cache keyed for iron gear wheels only. The gears fit too well, which is always suspicious.
tech-priests-stone-cache-iron-stick=A six-slot stone cache keyed for iron rods only. Officially iron sticks, spiritually rods, practically a bin of straightened arguments.
tech-priests-stone-cache-primitive-acclimator-battery-bank=A two-by-two primitive battery-bank cache. It stores electrical charge rather than physical items and unlocks with accumulator doctrine.
tech-priests-stone-cache-pressurized-fluid-vault=A two-by-two pressurized stone fluid vault. It stores fluid through ordinary pipe connections rather than physical inventory slots.
tech-priests-basic-space-cargo-inventory=A long, basic twenty-slot void cargo inventory intended to unlock alongside Void Cogitator doctrine for early platform-side stockpiling.
tech-priests-advanced-space-cargo-inventory=A hardened fifty-slot void cargo inventory for more serious platform-side stockpiling and later noospheric cargo discipline.

sacred-machine-oil-projectile=Invisible application carrier for Sacred Machine Oil capsule-use rites.

sacred-incense-projectile=Invisible application carrier for the Sacred Incense Grenade smoke rite.

tech-priests-machine-damage-smoke=Brief smoke marker used when a neglected machine spirit takes operational damage.

