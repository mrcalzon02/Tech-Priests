[technology-description]
tech-priest-reimprinting-acceleration-1=Shortens Cogitator re-imprinting recovery by twenty seconds. A dead Tech-Priest is not gone; the station merely needs less time to stuff the ghost back into obedient red cloth.
tech-priest-reimprinting-acceleration-2=Shortens Cogitator re-imprinting recovery by another twenty seconds. The station becomes better at the bleak art of manufacturing continuity out of trauma.
tech-priest-reimprinting-acceleration-3=Shortens Cogitator re-imprinting recovery by another twenty seconds. Reconstitution becomes fast enough to be called a doctrine rather than a funeral.
tech-priest-rite-of-kinetic-exemption=Installs blessed gait regulators, traction auguries, and transport-belt contempt routines. Existing and future Tech-Priests are replaced with belt-immune mobility chassis so no Senior Red Adept is humiliated by a level-one belt again.
pure-carbon-processing=Purifies coal into denser carbon feedstock, stripping away some of the geological embarrassment before the machine-cult pretends it was deliberate.
sodium-carbonate-synthesis=Combines ritual salt and pure carbon into sodium carbonate, an alkaline reagent for better sacred oil preparation and other future chemical indignities.
ritual-wood-pulping=Reduces wood into fibrous pulp suitable for doctrinal absorption, filtration, and the manufacture of more respectable sacred lubricants.
cogitator-operating-radius-1=Improves noospheric command clarity. All Cogitator Stations gain +1 operating radius.
cogitator-operating-radius-2=Installs stronger field-rite routing logic. All Cogitator Stations gain another +2 operating radius.
cogitator-operating-radius-3=Authorizes extended maintenance-cell jurisdiction. All Cogitator Stations gain another +2 operating radius, for +5 total. If the Quality mod is active, station quality also adds operating radius up to another +5 at legendary.
cogitator-radar-sweep-acceleration=Installs faster noospheric return logic into Cogitator Radar doctrine. Hover sweep time is reduced by another fifteen seconds after the faster 55/45/35/25/15 second station-rank ladder is accounted for, letting the arm discover trouble with less leisurely theological drama.
paraffin-separation=Separates crude oil into paraffin wax stock. The uninitiated call it petroleum chemistry. The initiated call it candle bureaucracy.
sacred-candle-rendering=Combines paraffin with Sacred Machine Oil to produce sacred candles, small combustible reminders that the machine spirit appreciates atmosphere and billable consumables.
ritual-of-machine-appeasement=Authorizes heavier maintenance rites combining imported servitor parts with Machine Maintenance Litanies. Restores twenty sanctification per application and lets the Tech-Priests escalate from oiling the machine to formally threatening it with blessed replacement organs.
orbital-relic-procurement=Authorizes the more expensive orbital route for relic fragments. This is staged after Machine Maintenance Litanies because the trade recipe itself consumes those litanies, and the Omnissiah frowns upon unlocking requisitions before their paperwork exists.
orbital-trader-deployment=Authorizes a local Orbital Trader altar using cargo-landing-pad doctrine where available. Because the altar consumes steel and red circuits, this technology now follows steel processing and advanced circuits before it opens basic off-world component and servitor import routes.
cogitator-station-deployment=Authorizes Junior Cogitator Stations only after the Orbital Trader can provide off-world cogitator components and servitor parts, and after the vanilla red-circuit chain has already been reached.
cogitator-logistic-requisition=Authorizes Cogitator Stations inside a logistics network to use hidden requester and active-provider caches after the proper requester-chest rites are available. Logistic robots deliver repair packs, consecration rites, and compatible small-arms ammunition to the station, while unwanted clutter can be shoved back into the network when a specific rite or munition is needed. The priest still burns through supplies like an irritated shrine clerk; now the clerk has bots.
intermediate-cogitator-stations=Authorizes Intermediate Cogitator Stations after Machine Maintenance Litanies exist, because the upgraded station recipe now consumes those litanies directly.
senior-cogitator-stations=Authorizes Senior Cogitator Stations only after Intermediate Stations and Orbital Relic Procurement are available, matching the relic-fragment and void-sealed cargo requirements of the final station tier.
machine-maintenance-litanies=Packages sacred candles, gears, and repair packs into a Machine Maintenance Litany: a stronger mid-tier sanctification rite. This chain now stands on its own material prerequisites instead of depending directly on Cogitator Station deployment.
ritual-salt-extraction=Extracts Ritual Salt from water after fluid-capable automation exists, rather than pretending brine can be hand-carried through the tech tree in a bucket with aspirations.
efficient-sacred-oil-rendering=Combines the staged salt, carbon, wood pulp, and fluid-handling chain into the four-output Sacred Machine Oil process.
machine-spirit-initial-consecration-1=Standardizes the first proper commissioning rite. Newly registered sanctified machines begin at 70/100 sanctification instead of 50/100, because the factory has finally learned that screaming at a cold assembler is not preventive maintenance.
machine-spirit-initial-consecration-2=Expands the commissioning rite into an actual doctrine. Newly registered sanctified machines begin at 90/100 sanctification, arriving almost obedient instead of spiritually half-feral.
machine-spirit-capacity-1=Authorizes reinforced reliquary tolerances and better sanctified maintenance registers. Machine Spirit maximum sanctification rises from 100 to 110 while preserving any maximum capacity already lost to abuse.
machine-spirit-capacity-2=Ratifies the higher sanctity envelope under senior red-robed supervision. Machine Spirit maximum sanctification rises from 110 to 120 while still preserving existing max-capacity scars.
sacred-incense-grenades=Authorizes throwable sacred incense charges: pale platform-safe smoke fields that sanctify nearby machinery progressively over time instead of simply bonking the machine spirit into obedience all at once.
blackstone-citadel-manufacture=Authorizes platform-only Citadel Manufactureo rites for processing the rare Blackstone asteroid lineage: dense, nearly indestructible matter of unknown arcane origin that should absolutely not be trusted simply because it is useful.
hydrogen-thruster-propulsion=Authorizes crude water electrolysis, primitive hydrogen thrusters, and vacuum-side steam machinery for space platforms. The doctrine is simple: melt ice into water, split some of it with unreasonable electricity, boil the rest with whatever burns, and push the vessel forward with chemically enthusiastic obedience.
thetazine-propulsion=Authorizes the regrettably energetic Thetazine chain: carbonic acid, iron salts, magneto-resonant slurry, prodigious Blackstone-catalyzed fuel production, and the water-reactive Thetazine Thruster. This is not clean chemistry. It is orbital propulsion by way of wet heresy.
void-fusion-thruster-propulsion=Authorizes the final electric void-fusion drive spine: a one-by-nine platform thruster fed by vast sealed void stores, Blackstone slabs, lightning rods, and enough portable fusion reactors to make a safety officer resign by candlelight.
void-cogitator-stations=Unlocks Void Cogitator Stations and Void Tech-Priests: specialized stationborne servants of the Machine Spirit trained for platform inspection, consecration, repair, and emergency logistics in environments where walking is more of a suggestion than a doctrine.
void-sealed-cargo-unsealing=Authorizes controlled opening, scrutiny, and unsealing of Void-Sealed Cargo into low-probability Mechanicus salvage, odd parallel battlefield equipment, and esoteric intermediate components.
planetary-magos-cogitator-stations=Authorizes the fourth planetary Cogitator tier: the Planetary Magos, a black-robed command Tech-Priest above Senior grade and distinct from Void doctrine.
planetary-magos-command-range-1=Extends Planetary Magos command jurisdiction by +2 tiles.
planetary-magos-command-range-2=Extends Planetary Magos command jurisdiction by +2 tiles.
planetary-magos-command-range-3=Extends Planetary Magos command jurisdiction by +4 tiles.
planetary-magos-command-range-4=Extends Planetary Magos command jurisdiction by +4 tiles.

cogitator-operating-radius=Improves Cogitator operating radius doctrine. This compatibility alias protects older saves and UI references that used the unsuffixed operating-radius key.
servitor-parts=Authorizes procurement and handling of servitor parts for higher maintenance rites and Mechanicus construction chains.
tech-priests-doctrine-appeasement-logistics=A repeatable Conclave rite that placates the Logistics Reliquary when its preferred research cannot be pursued. Grants the family its normal loyalty relief on completion.
tech-priests-doctrine-appeasement-industry=A repeatable Conclave rite that placates the Forge-Industry doctrine when ordinary factory research is politically inconvenient. Grants the family its normal loyalty relief on completion.
tech-priests-doctrine-appeasement-energy=A repeatable Conclave rite that placates the Motive Force doctrine through sanctioned study of power, pressure, and tolerated sparks. Grants the family its normal loyalty relief on completion.
tech-priests-doctrine-appeasement-military=A repeatable Conclave rite that placates the Ballistic Litany through formally approved threat analysis. Grants the family its normal loyalty relief on completion.
tech-priests-doctrine-appeasement-science=A repeatable Conclave rite that placates the Noospheric Inquiry doctrine when no better research offering is available. Grants the family its normal loyalty relief on completion.
tech-priests-doctrine-appeasement-space=A repeatable Conclave rite that placates the Void Doctrine without requiring the factory to immediately hurl more infrastructure into the dark. Grants the family its normal loyalty relief on completion.
tech-priests-doctrine-appeasement-sanctification=A repeatable Conclave rite that placates the Machine-Spirit Rite through ceremonial doctrine review and officially measured humming. Grants the family its normal loyalty relief on completion.

tech-priests-data-spike-reclamation-1=Unlocks player-only Data Spikes. A spike latches onto a hostile entity for 90 seconds; if the countdown completes, ownership transfers to the spike user's force unless counter-spiked or removed.
tech-priests-data-spike-reclamation-2=Improves reclamation intrusion rites, reducing hostile capture countdowns by 20 seconds before defender hardening is applied.
tech-priests-data-spike-reclamation-3=Further refines noospheric breach sequencing, reducing hostile capture countdowns by another 20 seconds before defender hardening is applied.
tech-priests-data-spike-reclamation-4=Finalizes aggressive reclamation protocols, reducing hostile capture countdowns by another 20 seconds before defender hardening is applied.
tech-priests-data-spike-defense=Repeatable defensive hardening. Each level adds 10 seconds to enemy Data Spike capture countdowns against your force's entities.
